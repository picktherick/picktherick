<svg width="1200" height="760" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="1200" height="900">
    <div xmlns="http://www.w3.org/1999/xhtml">
      
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&amp;family=Inter:wght@300;400;500;600&amp;display=swap');

        * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
        }

        body {
          margin: 0;
        }

        .gh-wrap {
          width: 1200px;
          height: 1200px;
          background: #0d1117;
          border-radius: 24px;
          overflow: hidden;
          font-family: 'Inter', sans-serif;
          color: #e6edf3;
          border: 1px solid #21262d;
        }

        .gh-header {
          background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
          padding: 48px 48px 72px;
          text-align: center;
          position: relative;
        }

        .gh-header::after {
          content: '';
          position: absolute;
          bottom: -1px;
          left: 0;
          right: 0;
          height: 50px;
          background: #0d1117;
          border-top-left-radius: 100% 40px;
          border-top-right-radius: 100% 40px;
        }

        .gh-header h1 {
          font-size: 52px;
          font-weight: 600;
          color: white;
          margin-bottom: 12px;
        }

        .gh-header p {
          font-family: 'Fira Code', monospace;
          color: rgba(255,255,255,0.65);
          font-size: 16px;
        }

        .typing-bar {
          text-align: center;
          padding: 28px 48px 8px;
        }

        .typing-text {
          font-family: 'Fira Code', monospace;
          font-size: 16px;
          color: #58a6ff;
        }

        .gh-body {
          padding: 24px 48px 48px;
        }

        .gh-section {
          margin-bottom: 34px;
        }

        .gh-section-label {
          font-family: 'Fira Code', monospace;
          font-size: 12px;
          color: #8b949e;
          text-transform: uppercase;
          letter-spacing: .14em;
          margin-bottom: 16px;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .gh-section-label::after {
          content: '';
          flex: 1;
          height: 1px;
          background: #21262d;
        }

        .gh-bio {
          font-size: 17px;
          line-height: 1.9;
          color: #c9d1d9;
          border-left: 3px solid #21262d;
          padding-left: 18px;
        }

        .gh-bio p {
          margin-bottom: 14px;
        }

        .skills-grid {
          display: flex;
          flex-wrap: wrap;
          gap: 12px;
        }

        .skill-chip {
          display: flex;
          align-items: center;
          gap: 8px;
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 8px;
          padding: 8px 14px;
          font-family: 'Fira Code', monospace;
          font-size: 13px;
          color: #c9d1d9;
        }

        .skill-dot {
          width: 10px;
          height: 10px;
          border-radius: 50%;
        }

        .ruby { background: #CC342D; }
        .rails { background: #CC0000; }
        .js { background: #F7DF1E; }
        .bootstrap { background: #776edc; }
        .react { background: #61DAFB; }
        .postgres { background: #4169E1; }
        .others { background: #e0e0e0 }

        .stats-grid {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 18px;
        }

        .stat-card {
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 12px;
          padding: 20px;
        }

        .stat-title {
          font-size: 12px;
          color: #8b949e;
          margin-bottom: 14px;
          font-family: 'Fira Code', monospace;
        }

        .stat-row {
          display: flex;
          justify-content: space-between;
          margin-bottom: 10px;
          font-size: 14px;
        }

        .stat-label {
          color: #8b949e;
        }

        .stat-value {
          color: #58a6ff;
          font-family: 'Fira Code', monospace;
        }

        .contact-row {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
        }

        .contact-badge {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          background: #161b22;
          border: 1px solid #21262d;
          border-radius: 8px;
          padding: 10px 16px;
          font-size: 13px;
          color: #c9d1d9;
          text-decoration: none;
          font-family: 'Fira Code', monospace;
        }

        .badge-dot {
          width: 9px;
          height: 9px;
          border-radius: 50%;
        }

        .bd-blue { background: #0a66c2; }
        .bd-red { background: #ea4335; }
        .bd-teal { background: #25D366; }

      </style>

      <div class="gh-wrap">

        <div class="gh-header">
          <h1>Henrique (Rick)</h1>
          <p>Poços de Caldas - MG · Brasil</p>
        </div>

        <div class="typing-bar">
          <span class="typing-text">
            Full-Stack Web Developer · Ruby on Rails Enthusiast
          </span>
        </div>

        <div class="gh-body">

          <div class="gh-section">
            <div class="gh-section-label">sobre</div>

            <div class="gh-bio">
              <p>
                Desenvolvimento web focado em Ruby on Rails,
                integrações, arquitetura de sistemas e produtos escaláveis.
              </p>

              <p>
                Experiência com back-end, front-end,
                manutenção de sistemas e evolução de aplicações em produção.
              </p>

              <p>
                Foco em código limpo, performance,
                resolução eficiente de problemas e adaptação rápida.
              </p>
            </div>
          </div>

          <div class="gh-section">
            <div class="gh-section-label">stack</div>

            <div class="skills-grid">
              <span class="skill-chip"><span class="skill-dot ruby"></span>Ruby</span>
              <span class="skill-chip"><span class="skill-dot rails"></span>Rails</span>
              <span class="skill-chip"><span class="skill-dot js"></span>JavaScript</span>
              <span class="skill-chip"><span class="skill-dot bootstrap"></span>Bootstrap</span>
              <span class="skill-chip"><span class="skill-dot react"></span>React</span>
              <span class="skill-chip"><span class="skill-dot postgres"></span>PostgreSQL</span>
              <span class="skill-chip"><span class="skill-dot others"></span>Mais 24...</span>
            </div>
          </div>

          <div class="gh-section">
            <div class="gh-section-label">github stats</div>

            <div class="stats-grid">

              <div class="stat-card">
                <div class="stat-title">github activity</div>

                <div class="stat-row">
                  <span class="stat-label">commits</span>
                  <span class="stat-value">4.321</span>
                </div>

                <div class="stat-row">
                  <span class="stat-label">pull requests</span>
                  <span class="stat-value">429</span>
                </div>
              </div>

              <div class="stat-card">
                <div class="stat-title">top languages</div>

                <div class="stat-row">
                  <span class="stat-label">Ruby</span>
                  <span class="stat-value">84%</span>
                </div>

                <div class="stat-row">
                  <span class="stat-label">JavaScript</span>
                  <span class="stat-value">16%</span>
                </div>
              </div>

            </div>
          </div>

          <div class="gh-section">
            <div class="gh-section-label">contato</div>

            <div class="contact-row">
              <span class="contact-badge">
                <span class="badge-dot bd-blue"></span>
                www.linkedin.com/in/rickkque
              </span>

              <span class="contact-badge">
                <span class="badge-dot bd-red"></span>
                contato@rickonrails.com.br
              </span>
            </div>
          </div>

        </div>
      </div>
    </div>
  </foreignObject>
</svg>
